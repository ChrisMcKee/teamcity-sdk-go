services:
  api:
    build: .
    command: ./run-test.sh
  api10:
    build: .
    depends_on:
      - teamcity10
    links:
      - teamcity10
    command: ./run-test.sh -host=teamcity10
  teamcity10:
    build: test10
    ports:
      - 8112:8111
    volumes:
      - ./test10/teamcity:/test-data
